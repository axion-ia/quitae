<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quitaê — Categorias</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--sf:#fff;--sf2:#f0efe9;
  --bd:rgba(0,0,0,.08);--bdm:rgba(0,0,0,.14);
  --tx:#1a1a18;--tx2:#6b6b64;--tx3:#9b9b92;
  --red:#c94040;--red-bg:#fdf0f0;--red-bd:rgba(201,64,64,.25);
  --ora:#b07020;--ora-bg:#fdf5e8;--ora-bd:rgba(176,112,32,.25);
  --grn:#2d7a4f;--grn-bg:#edf7f2;--grn-bd:rgba(45,122,79,.25);
  --blu:#1e5fa8;--blu-bg:#eef4fd;
  --r:10px;--rs:6px;--f:'DM Sans',sans-serif;
  --sh:0 1px 3px rgba(0,0,0,.06);
}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5}
.layout{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;text-decoration:none;transition:background .15s}
.sidebar-logo:hover{background:var(--sf2)}
.logo-icon{width:32px;height:32px;background:var(--tx);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.logo-name{font-size:14px;font-weight:500;color:var(--tx)}
.logo-sub{font-size:11px;color:var(--tx3)}
.nav{padding:12px 10px;flex:1}
.nav-sec{font-size:10px;font-weight:500;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;padding:8px 10px 4px}
.nav-a{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);color:var(--tx2);font-size:13px;text-decoration:none;transition:all .15s;margin-bottom:1px}
.nav-a:hover{background:var(--sf2);color:var(--tx)}
.nav-a.on{background:var(--tx);color:#fff}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.tl .bc{font-size:12px;color:var(--tx3)}
.tl .bc b{color:var(--tx);font-weight:500}
.tl h1{font-size:18px;font-weight:500;margin-top:2px}
.tr{display:flex;gap:8px;align-items:center}
.content{padding:24px 28px;flex:1;overflow-y:auto}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:none;font-family:var(--f);transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-p{background:var(--tx);color:#fff}.btn-p:hover{background:#333}
.btn-g{background:none;border:1px solid var(--bdm);color:var(--tx)}.btn-g:hover{background:var(--sf2)}
.btn-d{background:var(--red);color:#fff;border:none}.btn-d:hover{background:#a83535}
.btn-i{padding:6px;border-radius:var(--rs);background:none;border:1px solid var(--bdm);color:var(--tx2);cursor:pointer;display:inline-flex;align-items:center;transition:all .15s}
.btn-i:hover{background:var(--sf2);color:var(--tx)}
/* Card */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh)}
.card-h{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-t{font-size:13px;font-weight:500}
.card-lk{font-size:12px;color:var(--blu);text-decoration:none}.card-lk:hover{text-decoration:underline}
/* Stats */
.stats{display:grid;gap:12px;margin-bottom:20px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.stat-lbl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-val{font-size:21px;font-weight:500;margin-bottom:2px}
.stat-sub{font-size:11px;color:var(--tx3)}
/* Table */
.tcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.tcard-top{padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:#fafaf7}
.tcard-cnt{font-size:12px;color:var(--tx3)}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;padding:10px 16px;border-bottom:1px solid var(--bd);background:#fafaf7;white-space:nowrap}
tbody td{padding:11px 16px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafaf7}
.acts{display:flex;gap:4px;justify-content:flex-end}
/* Badge */
.bdg{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:99px}
.bdg-s{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bd)}
.bdg-d{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.bdg-w{background:var(--ora-bg);color:var(--ora);border:1px solid var(--ora-bd)}
.bdg-i{background:var(--blu-bg);color:var(--blu);border:1px solid rgba(30,95,168,.2)}
/* Dot */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
/* Filter */
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.sw{position:relative;flex:1;min-width:200px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--tx3);pointer-events:none}
.si{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--bdm);border-radius:var(--rs);font-family:var(--f);font-size:13px;color:var(--tx);background:var(--sf);outline:none;height:34px}
.si:focus{border-color:var(--tx)}
select.fs{padding:0 10px;border:1px solid var(--bdm);border-radius:var(--rs);font-family:var(--f);font-size:13px;color:var(--tx);background:var(--sf);outline:none;height:34px;cursor:pointer}
select.fs:focus{border-color:var(--tx)}
/* Drawer */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200}
.ov.open{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:460px;background:var(--sf);box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.drawer.open{transform:translateX(0)}
.dh{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dt{font-size:16px;font-weight:500}
.db{flex:1;overflow-y:auto;padding:24px}
.df{padding:16px 24px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
/* Form */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px}
.fg label .req{color:var(--red)}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;border:1px solid var(--bdm);border-radius:var(--rs);font-family:var(--f);font-size:13px;color:var(--tx);background:var(--sf);outline:none;transition:border-color .15s}
.fg input,.fg select{height:36px}
.fg textarea{height:72px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--tx)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.div{border:none;border-top:1px solid var(--bd);margin:20px 0}
.ssec{font-size:12px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--sf);border-radius:var(--r);padding:24px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:8px}
.modal p{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.5}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tx);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--red)}
/* Empty */
.empty{text-align:center;padding:48px;color:var(--tx3)}
.empty svg{opacity:.3;margin-bottom:12px}
.empty p{font-size:13px}
/* Legend */
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:12px;color:var(--tx2)}
.leg-i{display:flex;align-items:center;gap:4px}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
@media(max-width:768px){.sidebar{display:none}.content{padding:16px}.drawer{width:100%}}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.cor-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.cor-opt:hover{transform:scale(1.15)}
.cor-opt.on{border-color:var(--tx);transform:scale(1.15)}
.uso-bg{height:4px;background:var(--sf2);border-radius:99px;width:80px}
.uso-fill{height:4px;border-radius:99px}
.ei{width:100%;padding:5px 8px;border:1px solid var(--bdm);border-radius:var(--rs);font-family:var(--f);font-size:13px;outline:none;background:#fff}
.ei:focus{border-color:var(--tx)}
</style>
</head>

<div class="layout">
  <aside class="sidebar">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div><div class="logo-name">Quitaê</div><div class="logo-sub">Página Inicial ↖</div></div>

      <a class="nav-a" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a class="nav-a" href="contas.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Contas a Pagar</a>
      <a class="nav-a" href="fornecedores.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Fornecedores</a>
      <a class="nav-a" href="relatorios.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Relatórios</a>
      <div class="nav-sec" style="margin-top:12px">Configurações</div>

    </nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="tl"><div class="bc">Configurações › <b>Categorias</b></div><h1>Categorias</h1></div>

    </div>
    <div class="content">
      <div class="stats3">
        <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" id="s-tot">0</div></div>
        <div class="stat"><div class="stat-lbl">Fixas</div><div class="stat-val" id="s-fix">0</div></div>
        <div class="stat"><div class="stat-lbl">Variáveis</div><div class="stat-val" id="s-var">0</div></div>
      </div>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end;padding:16px 20px;border-bottom:1px solid var(--bd);background:#fafaf7;border-radius:var(--r) var(--r) 0 0">
          <div class="fg" style="margin:0"><label>Nome da Categoria <span class="req">*</span></label><input id="f-nome" placeholder="Ex: Energia Elétrica" maxlength="60" onkeydown="if(event.key==='Enter')addCat()"></div>
          <div class="fg" style="margin:0"><label>Tipo</label><select id="f-tipo"><option value="fixa">Despesa Fixa</option><option value="variavel">Despesa Variável</option><option value="investimento">Investimento</option></select></div>
          <div class="fg" style="margin:0">
            <label>Cor</label>
            <div style="display:flex;gap:5px;flex-wrap:wrap;padding-top:4px" id="cors">
              <div class="cor-opt on" style="background:#378ADD" data-c="#378ADD" onclick="selCor(this)"></div>
              <div class="cor-opt" style="background:#1D9E75" data-c="#1D9E75" onclick="selCor(this)"></div>
              <div class="cor-opt" style="background:#EF9F27" data-c="#EF9F27" onclick="selCor(this)"></div>
              <div class="cor-opt" style="background:#E24B4A" data-c="#E24B4A" onclick="selCor(this)"></div>
              <div class="cor-opt" style="background:#7F77DD" data-c="#7F77DD" onclick="selCor(this)"></div>
              <div class="cor-opt" style="background:#D85A30" data-c="#D85A30" onclick="selCor(this)"></div>
              <div class="cor-opt" style="background:#888780" data-c="#888780" onclick="selCor(this)"></div>
              <div class="cor-opt" style="background:#2d7a4f" data-c="#2d7a4f" onclick="selCor(this)"></div>
            </div>
          </div>
          <div class="fg" style="margin:0"><label>&nbsp;</label><button class="btn btn-p" onclick="addCat()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Adicionar</button></div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th style="width:36px"></th><th>Nome</th><th>Tipo</th><th>Uso</th><th style="text-align:right;width:160px">Ações</th></tr></thead>
            <tbody id="tbl"></tbody>
          </table>
          <div class="empty" id="empty">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><rect x="8" y="8" width="32" height="32" rx="4"/><line x1="16" y1="20" x2="32" y2="20"/><line x1="16" y1="28" x2="24" y2="28"/></svg>
            <p style="font-weight:500;margin-bottom:4px">Nenhuma Categoria Ainda</p>
            <p>Adicione categorias para organizar suas contas.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="mbg" id="mdel"><div class="modal"><h3>Excluir Categoria?</h3><p id="mdel-msg"></p><div class="mbtns"><button class="btn btn-g" onclick="fModal()">Cancelar</button><button class="btn btn-d" onclick="confDel()">Excluir</button></div></div></div>

<script>
(function(){try{var x=localStorage.getItem('quitae_auth');if(!x){window.location.href='index.html';return;}var d=JSON.parse(x);if(Date.now()>d.e){localStorage.removeItem('quitae_auth');window.location.href='index.html';}}catch(e){window.location.href='index.html';}})();
var KEY='fincontrol_categorias',cats=[],cor='#378ADD',delId=null,editId=null;
var TL={fixa:'Despesa Fixa',variavel:'Despesa Variável',investimento:'Investimento'};
var TC={fixa:'bdg-i',variavel:'bdg-w',investimento:'bdg-s'};
var CORES=['#378ADD','#1D9E75','#EF9F27','#E24B4A','#7F77DD','#D85A30','#888780','#2d7a4f'];
function save(){localStorage.setItem(KEY,JSON.stringify(cats));}
function load(){var r=localStorage.getItem(KEY);cats=r?JSON.parse(r):[];render();stats();}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function selCor(el){document.querySelectorAll('.cor-opt').forEach(function(o){o.classList.remove('on');});el.classList.add('on');cor=el.dataset.c;}
function addCat(){
  var n=document.getElementById('f-nome').value.trim();
  var t=document.getElementById('f-tipo').value;
  if(!n){document.getElementById('f-nome').style.borderColor='var(--red)';toast('Informe o nome.',true);return;}
  document.getElementById('f-nome').style.borderColor='';
  if(cats.some(function(c){return c.nome.toLowerCase()===n.toLowerCase();})){toast('Já existe uma categoria com esse nome.',true);return;}
  cats.unshift({id:uid(),nome:n,tipo:t,cor:cor,uso:0});
  save();render();stats();document.getElementById('f-nome').value='';
  toast('Categoria "'+n+'" adicionada.');
}
function render(){
  var tb=document.getElementById('tbl'),em=document.getElementById('empty');
  if(!cats.length){tb.innerHTML='';em.style.display='';return;}
  em.style.display='none';
  var mx=Math.max.apply(null,cats.map(function(c){return c.uso;}));if(!mx)mx=1;
  tb.innerHTML=cats.map(function(c){
    var p=Math.round(c.uso/mx*100);
    return '<tr id="r-'+c.id+'">'+
      '<td><div style="width:12px;height:12px;border-radius:50%;background:'+c.cor+';margin:auto"></div></td>'+
      '<td>'+esc(c.nome)+'</td>'+
      '<td><span class="bdg '+TC[c.tipo]+'">'+TL[c.tipo]+'</span></td>'+
      '<td><div style="display:flex;align-items:center;gap:8px"><div class="uso-bg"><div class="uso-fill" style="width:'+p+'%;background:'+c.cor+'"></div></div><span style="font-size:11px;color:var(--tx3)">'+c.uso+'</span></div></td>'+
      '<td style="text-align:right"><div class="acts">'+
        '<button class="btn btn-g" style="padding:5px 10px;font-size:12px" onclick="startEdit(\''+c.id+'\')">Editar</button>'+
        '<button class="btn-i" style="color:var(--red)" onclick="askDel(\''+c.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>'+
      '</div></td></tr>';
  }).join('');
}
function startEdit(id){
  if(editId)render();editId=id;
  var c=cats.find(function(x){return x.id===id;});
  var tr=document.getElementById('r-'+id);
  tr.innerHTML=
    '<td><div style="width:12px;height:12px;border-radius:50%;background:'+c.cor+';margin:auto" id="ed-dot"></div></td>'+
    '<td><input class="ei" id="ed-n" value="'+esc(c.nome)+'" maxlength="60"></td>'+
    '<td><select class="ei" id="ed-t" style="height:30px">'+
      '<option value="fixa"'+(c.tipo==='fixa'?' selected':'')+'>Despesa Fixa</option>'+
      '<option value="variavel"'+(c.tipo==='variavel'?' selected':'')+'>Despesa Variável</option>'+
      '<option value="investimento"'+(c.tipo==='investimento'?' selected':'')+'>Investimento</option>'+
    '</select></td>'+
    '<td><div style="display:flex;gap:5px;flex-wrap:wrap">'+
      CORES.map(function(cl){return '<div onclick="eCor(this,\''+id+'\')" data-c="'+cl+'" style="width:18px;height:18px;border-radius:50%;background:'+cl+';cursor:pointer;border:2px solid '+(cl===c.cor?'#1a1a18':'transparent')+';transition:.15s"></div>';}).join('')+
    '</div></td>'+
    '<td style="text-align:right"><div class="acts">'+
      '<button class="btn btn-p" style="padding:5px 10px;font-size:12px" onclick="saveEdit(\''+id+'\')">Salvar</button>'+
      '<button class="btn btn-g" style="padding:5px 10px;font-size:12px" onclick="cancelEdit()">Cancelar</button>'+
    '</div></td>';
  document.getElementById('ed-n').focus();
}
function eCor(el,id){
  var c=cats.find(function(x){return x.id===id;});c.ct=el.dataset.c;
  el.closest('td').querySelectorAll('div[data-c]').forEach(function(d){d.style.borderColor='transparent';});
  el.style.borderColor='#1a1a18';document.getElementById('ed-dot').style.background=el.dataset.c;
}
function saveEdit(id){
  var n=document.getElementById('ed-n').value.trim();
  if(!n){toast('Informe o nome.',true);return;}
  if(cats.some(function(c){return c.nome.toLowerCase()===n.toLowerCase()&&c.id!==id;})){toast('Nome já existe.',true);return;}
  var c=cats.find(function(x){return x.id===id;});
  c.nome=n;c.tipo=document.getElementById('ed-t').value;
  if(c.ct){c.cor=c.ct;delete c.ct;}
  editId=null;save();render();stats();toast('Categoria atualizada.');
}
function cancelEdit(){editId=null;render();}
function askDel(id){
  delId=id;var c=cats.find(function(x){return x.id===id;});
  document.getElementById('mdel-msg').textContent=c.uso>0?'"'+c.nome+'" possui '+c.uso+' conta(s). O histórico será mantido.':'"'+c.nome+'" será excluída permanentemente.';
  document.getElementById('mdel').classList.add('open');
}
function fModal(){document.getElementById('mdel').classList.remove('open');delId=null;}
function confDel(){
  var n=cats.find(function(c){return c.id===delId;})?.nome||'';
  cats=cats.filter(function(c){return c.id!==delId;});
  save();render();stats();fModal();toast('Categoria "'+n+'" excluída.');
}
function stats(){
  document.getElementById('s-tot').textContent=cats.length;
  document.getElementById('s-fix').textContent=cats.filter(function(c){return c.tipo==='fixa';}).length;
  document.getElementById('s-var').textContent=cats.filter(function(c){return c.tipo==='variavel';}).length;
}
function toast(msg,e){var t=document.getElementById('toast');t.textContent=msg;t.className='show'+(e?' err':'');clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},2800);}
document.getElementById('mdel').addEventListener('click',function(e){if(e.target===this)fModal();});
load();
</script>
</body>
</html>
